<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR GPS Room Test</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
    <div id="logger" style="position:fixed; top:0; left:0; width:100%; z-index:9999; background:rgba(0,0,0,0.8); color:lime; font-family:monospace; font-size:12px; padding:10px;">
        Статус: Инициализация...
    </div>

    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" 
             vr-mode-ui="enabled: false">
        
        <a-camera gps-camera rotation-reader>
            <a-cursor color="yellow"></a-cursor>
        </a-camera>

        <a-entity id="main-target" 
                  class="clickable"
                  geometry="primitive: box" 
                  material="color: red" 
                  scale="1 1 1"
                  visible="false"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-entity>

        <a-text id="score-val" value="Score: 0" position="0 -1 -2.5" align="center" color="white"></a-text>
    </a-scene>

    <script>
        const logger = document.getElementById('logger');
        const target = document.querySelector('#main-target');
        const scoreText = document.querySelector('#score-val');
        let points = 0;
        let isPlaced = false;

        function log(msg) {
            logger.innerHTML += "<br>> " + msg;
        }

        if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
            log("КРИТИЧЕСКАЯ ОШИБКА: Нужен HTTPS!");
            logger.style.color = "red";
        }

        window.addEventListener('gps-camera-update-position', (e) => {
            const lat = e.detail.position.latitude;
            const lon = e.detail.position.longitude;
            log(`GPS пойман: ${lat.toFixed(5)}, ${lon.toFixed(5)}`);

            if (!isPlaced) {
                target.setAttribute('gps-entity-place', {
                    latitude: lat + 0.00002,
                    longitude: lon + 0.00002
                });
                target.setAttribute('visible', 'true');
                isPlaced = true;
                log("Объект отрисован рядом с вами");
            }
        });

        target.addEventListener('click', () => {
            points++;
            scoreText.setAttribute('value', `Score: ${points}`);
            log("Попадание!");
            
            target.setAttribute('visible', 'false');
            setTimeout(() => {
                const attr = target.getAttribute('gps-entity-place');
                target.setAttribute('gps-entity-place', {
                    latitude: parseFloat(attr.latitude) + 0.00002,
                    longitude: parseFloat(attr.longitude) + 0.00002
                });
                target.setAttribute('visible', 'true');
            }, 1000);
        });

        window.addEventListener('gps-camera-error', (e) => {
            log("Ошибка датчиков: " + e.detail.message);
        });
    </script>
</body>
</html>
