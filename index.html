<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR GPS mini-game</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

    <a-scene embedded vr-mode-ui="enabled: false"
             arjs="sourceType: webcam; debugUIEnabled: false;"
             renderer="antialias: true; alpha: true">

        <a-camera id="camera" gps-camera rotation-reader>
            <a-cursor raycaster="objects: .clickable"></a-cursor>
        </a-camera>

        <a-entity light="type: ambient; intensity: 0.5;"></a-entity>
        <a-entity light="type: directional; intensity: 0.8;" position="1 2 1"></a-entity>

        <a-entity id="target" gps-entity-place="latitude: 0; longitude: 0">
            <a-box class="clickable"
                   color="red"
                   scale="10 10 10"
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"
                   animation__click="property: scale; startEvents: click; from: 10 10 10; to: 0 0 0; dur: 300">
            </a-box>
        </a-entity>

        <a-entity id="arrow-container" position="0 -1 -2">
            <a-cone id="arrow" color="yellow" height="0.5" radius-bottom="0.2" rotation="90 0 0"></a-cone>
        </a-entity>

        <a-text id="distanceText" value="Searching GPS..." position="0 2 -3" align="center" color="yellow" scale="1 1 1"></a-text>
        <a-text id="scoreText" value="Score: 0" position="0 1.5 -3" align="center" color="white" scale="0.8 0.8 0.8"></a-text>

    </a-scene>

    <script>
        let score = 0;
        let targetSet = false;

        const camera = document.querySelector('#camera');
        const target = document.querySelector('#target');
        const arrow = document.querySelector('#arrow');
        const distanceText = document.querySelector('#distanceText');
        const scoreText = document.querySelector('#scoreText');
        window.addEventListener('gps-camera-update-position', e => {
            const userLat = e.detail.position.latitude;
            const userLon = e.detail.position.longitude;

            if (!targetSet) {
                const tLat = userLat + 0.0001;
                const tLon = userLon + 0.0001;
                
                target.setAttribute('gps-entity-place', `latitude: ${tLat}; longitude: ${tLon}`);
                targetSet = true;
                console.log("Target placed at:", tLat, tLon);
            }
            const targetPos = target.object3D.position;
            const cameraPos = camera.object3D.position;
            const dist = Math.sqrt(Math.pow(targetPos.x - cameraPos.x, 2) + Math.pow(targetPos.z - cameraPos.z, 2));

            distanceText.setAttribute('value', `Distance: ${Math.round(dist)} m`);
        });
        target.addEventListener('click', () => {
            score++;
            scoreText.setAttribute('value', `Score: ${score}`);
            setTimeout(() => {
                const currentAttr = target.getAttribute('gps-entity-place');
                target.setAttribute('gps-entity-place', `latitude: ${parseFloat(currentAttr.latitude) + 0.0001}; longitude: ${parseFloat(currentAttr.longitude)}`);
                target.querySelector('a-box').setAttribute('scale', '10 10 10');
            }, 1000);
        });
    </script>
</body>
</html>
