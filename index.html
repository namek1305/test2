<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR GPS Mini-Game in room</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
    <div id="logger" style="position:fixed; top:0; left:0; width:100%; z-index:9999; background:rgba(0,0,0,0.8); color:lime; font-family:monospace; font-size:12px; padding:10px;">
        Статус: Ожидание GPS...
    </div>

    <a-scene embedded vr-mode-ui="enabled: false"
             arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="box-model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF-Binary/Box.glb"></a-asset-item>
        </a-assets>

        <a-camera gps-camera rotation-reader>
            <a-cursor color="cyan" raycaster="objects: .clickable; far: 50"></a-cursor>
        </a-camera>

        <a-text id="score-val" value="Score: 0" position="0 2 -3" align="center" color="white" scale="0.6 0.6 0.6"></a-text>
    </a-scene>

    <script>
        const logger = document.getElementById('logger');
        const scoreText = document.getElementById('score-val');
        const scene = document.querySelector('a-scene');
        let points = 0;
        let activeObjects = 0;
        let lastLat = null;
        let lastLon = null;

        function log(msg) {
            logger.innerHTML = "> " + msg;
        }

        function createObject() {
            if (activeObjects >= 2 || !lastLat) return;

            activeObjects++;
            const el = document.createElement('a-entity');
            
            el.setAttribute('geometry', 'primitive: sphere; radius: 0.8');
            el.setAttribute('material', 'visible: false'); 
            el.setAttribute('class', 'clickable');
            
            const model = document.createElement('a-entity');
            model.setAttribute('gltf-model', '#box-model');
            model.setAttribute('scale', '0.3 0.3 0.3');
            model.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 3000');
            el.appendChild(model);

            const latOffset = (Math.random() - 0.5) * 0.00006;
            const lonOffset = (Math.random() - 0.5) * 0.00006;

            el.setAttribute('gps-entity-place', {
                latitude: lastLat + latOffset,
                longitude: lastLon + lonOffset
            });

            el.addEventListener('click', () => {
                points++;
                scoreText.setAttribute('value', `Score: ${points}`);
                log("Объект собран!");
                
                el.parentNode.removeChild(el);
                activeObjects--;

                setTimeout(createObject, 1500);
            });

            scene.appendChild(el);
        }

        window.addEventListener('gps-camera-update-position', (e) => {
            lastLat = e.detail.position.latitude;
            lastLon = e.detail.position.longitude;
            log(`GPS: ${lastLat.toFixed(5)}, ${lastLon.toFixed(5)}`);

            if (activeObjects === 0) {
                createObject();
                createObject();
            }
        });

        window.addEventListener('gps-camera-error', (e) => {
            logger.style.background = "red";
            log("GPS Error. Check HTTPS.");
        });
    </script>
</body>
</html>
