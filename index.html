<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR GPS Mini-Game Fixed</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
    <div id="logger" style="position:fixed; top:0; left:0; width:100%; z-index:9999; background:rgba(0,0,0,0.8); color:lime; font-family:monospace; font-size:12px; padding:10px;">
        Статус: Инициализация...
    </div>

    <a-scene embedded
             vr-mode-ui="enabled: false"
             arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <a-asset-item id="box-model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF-Binary/Box.glb"></a-asset-item>
        </a-assets>

        <a-camera gps-camera rotation-reader>
            <a-cursor color="yellow" raycaster="objects: .clickable"></a-cursor>
        </a-camera>

        <a-text id="score-val" value="Score: 0" position="0 2 -3" align="center" color="white" scale="0.5 0.5 0.5"></a-text>
    </a-scene>

    <script>
        const logger = document.getElementById('logger');
        const scoreText = document.getElementById('score-val');
        const scene = document.querySelector('a-scene');
        let points = 0;
        let objectsCreated = false;

        function log(msg) {
            console.log(msg);
            logger.innerHTML += "<br>> " + msg;
            const lines = logger.innerHTML.split('<br>');
            if (lines.length > 8) logger.innerHTML = lines.slice(-8).join('<br>');
        }

        function createObject(lat, lon) {
            const el = document.createElement('a-entity');
            
            el.setAttribute('class', 'clickable');
            el.setAttribute('gltf-model', '#box-model');
            el.setAttribute('scale', '2 2 2');
            
            const latOffset = (Math.random() - 0.5) * 0.0001;
            const lonOffset = (Math.random() - 0.5) * 0.0001;

            el.setAttribute('gps-entity-place', {
                latitude: lat + latOffset,
                longitude: lon + lonOffset
            });

            el.addEventListener('click', () => {
                points++;
                scoreText.setAttribute('value', `Score: ${points}`);
                log("Попадание!");
                
                el.setAttribute('visible', 'false');
                
                setTimeout(() => {
                    const newLat = lat + (Math.random() - 0.5) * 0.0001;
                    const newLon = lon + (Math.random() - 0.5) * 0.0001;
                    el.setAttribute('gps-entity-place', { latitude: newLat, longitude: newLon });
                    el.setAttribute('visible', 'true');
                }, 1000);
            });

            scene.appendChild(el);
        }
        window.addEventListener('gps-camera-update-position', (e) => {
            const lat = e.detail.position.latitude;
            const lon = e.detail.position.longitude;
            
            log(`Координаты: ${lat.toFixed(5)}, ${lon.toFixed(5)}`);

            if (!objectsCreated) {
                for (let i = 0; i < 3; i++) {
                    createObject(lat, lon);
                }
                objectsCreated = true;
                log("Объекты созданы!");
            }
        });

        setTimeout(() => {
            if (!objectsCreated) log("Ожидание сигнала GPS... Выйдите к окну.");
        }, 5000);

        window.addEventListener('gps-camera-error', (e) => {
            log("КРИТИЧЕСКАЯ ОШИБКА GPS: " + e.detail.message);
        });
    </script>
</body>
</html>
