<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR GPS Mini-Game</title>
    <link rel="icon" href="data:,">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
    <div id="logger" style="position:fixed; top:0; left:0; width:100%; z-index:9999; background:rgba(0,0,0,0.8); color:lime; font-family:monospace; font-size:12px; padding:10px;">
        Статус: Инициализация...
    </div>

    <a-scene embedded
             arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
             vr-mode-ui="enabled: false">

        <a-assets>
            <a-asset-item id="box-model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF/Box.gltf"></a-asset-item>
        </a-assets>

        <a-sky color="#87CEEB"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#228B22"></a-plane>
        <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
        <a-light type="directional" position="0 10 5" intensity="0.6"></a-light>

        <a-camera gps-camera rotation-reader>
            <a-cursor color="yellow" fuse="true" fuse-timeout="1000"></a-cursor>
        </a-camera>

        <a-entity id="main-target"
                  class="clickable"
                  gltf-model="#box-model"
                  scale="1 1 1"
                  visible="false"
                  animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 5000">
        </a-entity>

        <a-text id="score-val" value="Score: 0" position="0 2 -2.5" align="center" color="white"></a-text>
    </a-scene>

    <script>
        const logger = document.getElementById('logger');
        const target = document.getElementById('main-target');
        const scoreText = document.getElementById('score-val');
        let points = 0;
        let isPlaced = false;

        function log(msg) {
            logger.innerHTML = logger.innerHTML.split('<br>').slice(-10).join('<br>') + "<br>> " + msg;
        }

        window.addEventListener('gps-camera-update-position', (e) => {
            const lat = e.detail.position.latitude;
            const lon = e.detail.position.longitude;
            log(`GPS пойман: ${lat.toFixed(5)}, ${lon.toFixed(5)}`);

            if (!isPlaced) {
                target.setAttribute('gps-entity-place', {
                    latitude: lat + 0.00005,
                    longitude: lon + 0.00005
                });
                target.setAttribute('visible', 'true');
                isPlaced = true;
                log("Объект отрисован рядом с вами");
            }
        });

        target.addEventListener('click', () => {
            points++;
            scoreText.setAttribute('value', `Score: ${points}`);
            log("Попадание!");

            target.setAttribute('visible', 'false');
            setTimeout(() => {
                const { latitude, longitude } = target.getAttribute('gps-entity-place');
                if (latitude && longitude) {
                    target.setAttribute('gps-entity-place', {
                        latitude: parseFloat(latitude) + 0.00005,
                        longitude: parseFloat(longitude) + 0.00005
                    });
                    target.setAttribute('visible', 'true');
                }
            }, 1000);
        });

        window.addEventListener('gps-camera-error', (e) => {
            log("Ошибка GPS: " + e.detail.message);
        });
    </script>
</body>
</html>
