<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR GPS WORKING</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene embedded vr-mode-ui="enabled: false"
arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: true">

<a-camera id="camera" gps-camera rotation-reader></a-camera>

<a-entity id="target">
<a-box class="clickable"
color="red"
scale="6 6 6"
animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
</a-box>
</a-entity>

<a-entity id="arrow" position="0 -1 -4">
<a-cone color="yellow" height="1" radius-bottom="0.4" radius-top="0"></a-cone>
</a-entity>

<a-text id="distanceText"
value="Waiting GPS..."
position="0 2 -3"
align="center"
color="yellow"></a-text>

<a-text id="scoreText"
value="Score: 0"
position="0 1.5 -3"
align="center"
color="white"></a-text>

</a-scene>

<script>
let score = 0;
let targetLat = null;
let targetLon = null;

const camera = document.querySelector('#camera');
const target = document.querySelector('#target');
const arrow = document.querySelector('#arrow');
const distanceText = document.querySelector('#distanceText');
const scoreText = document.querySelector('#scoreText');

function setTargetNearUser(lat, lon){
targetLat = lat + 0.00005;
targetLon = lon + 0.00005;

target.setAttribute('gps-entity-place',
`latitude: ${targetLat}; longitude: ${targetLon}`);
}

function getDistance(lat1, lon1, lat2, lon2){
const R = 6371e3;
const φ1 = lat1*Math.PI/180;
const φ2 = lat2*Math.PI/180;
const Δφ = (lat2-lat1)*Math.PI/180;
const Δλ = (lon2-lon1)*Math.PI/180;

const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) +
Math.cos(φ1)*Math.cos(φ2) *
Math.sin(Δλ/2)*Math.sin(Δλ/2);

const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return R*c;
}

window.addEventListener('gps-camera-update-position', e => {

const lat = e.detail.position.latitude;
const lon = e.detail.position.longitude;

if(targetLat === null){
setTargetNearUser(lat, lon);
}

const dist = getDistance(lat, lon, targetLat, targetLon);

distanceText.setAttribute('value',
'Distance: ' + Math.round(dist) + ' m');

arrow.object3D.lookAt(target.object3D.position);

});

window.addEventListener('click', e => {

if(e.target.classList &&
e.target.classList.contains('clickable')){

score++;
scoreText.setAttribute('value', 'Score: ' + score);

e.target.setAttribute('animation',
'property: scale; to: 0 0 0; dur:300');

setTimeout(() => {
setTargetNearUser(targetLat, targetLon);
e.target.setAttribute('scale', '6 6 6');
}, 500);
}

});
</script>

</body>
</html>
