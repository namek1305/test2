<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR GPS Mini-Game Multiple Objects</title>
    <link rel="icon" href="data:,">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
    <div id="logger" style="position:fixed; top:0; left:0; width:100%; z-index:9999; background:rgba(0,0,0,0.8); color:lime; font-family:monospace; font-size:12px; padding:10px;">
        Статус: Инициализация...
    </div>

    <a-scene embedded
             vr-mode-ui="enabled: false"
             arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <a-asset-item id="box-model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF/Box.gltf"></a-asset-item>
        </a-assets>

        <a-camera gps-camera rotation-reader>
            <a-cursor color="yellow" fuse="true" fuse-timeout="1000" raycaster="objects: .clickable"></a-cursor>
        </a-camera>

        <a-text id="score-val" value="Score: 0" position="0 2 -2" align="center" color="white"></a-text>
    </a-scene>

    <script>
        const logger = document.getElementById('logger');
        const scoreText = document.getElementById('score-val');
        let points = 0;
        const objects = [];
        const NUM_OBJECTS = 5;
        let userLat = null;
        let userLon = null;

        function log(msg) {
            logger.innerHTML = logger.innerHTML.split('<br>').slice(-10).join('<br>') + "<br>> " + msg;
        }

        function createObject(lat, lon) {
            const el = document.createElement('a-entity');
            el.setAttribute('gltf-model', '#box-model');
            el.setAttribute('scale', '1 1 1');
            el.setAttribute('class', 'clickable');
            el.setAttribute('data-raycastable', '');
            el.setAttribute('animation__rotate', 'property: rotation; to: 0 360 0; loop: true; dur: 5000');
            el.setAttribute('gps-entity-place', {
                latitude: lat + (Math.random() - 0.5) * 0.0001,
                longitude: lon + (Math.random() - 0.5) * 0.0001
            });
            el.setAttribute('visible', 'true');

            el.addEventListener('click', () => {
                points++;
                scoreText.setAttribute('value', `Score: ${points}`);
                log("Попадание!");
                el.setAttribute('visible', 'false');

                setTimeout(() => {
                    const gpsAttr = el.getAttribute('gps-entity-place');
                    if (gpsAttr && gpsAttr.latitude && gpsAttr.longitude) {
                        el.setAttribute('gps-entity-place', {
                            latitude: parseFloat(gpsAttr.latitude) + (Math.random() - 0.5) * 0.0001,
                            longitude: parseFloat(gpsAttr.longitude) + (Math.random() - 0.5) * 0.0001
                        });
                        el.setAttribute('visible', 'true');
                    }
                }, 1000);
            });

            document.querySelector('a-scene').appendChild(el);
            objects.push(el);
        }

        window.addEventListener('gps-camera-update-position', (e) => {
            userLat = e.detail.position.latitude;
            userLon = e.detail.position.longitude;
            log(`GPS пойман: ${userLat.toFixed(5)}, ${userLon.toFixed(5)}`);

            if (objects.length === 0 && userLat && userLon) {
                for (let i = 0; i < NUM_OBJECTS; i++) {
                    createObject(userLat, userLon);
                }
                log(`Создано ${NUM_OBJECTS} объектов в реальном мире`);
            }
        });

        window.addEventListener('gps-camera-error', (e) => {
            log("Ошибка GPS: " + e.detail.message);
        });
    </script>
</body>
</html>
