<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene embedded vr-mode-ui="enabled: false"
         arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-camera id="camera" gps-camera rotation-reader>
        <a-cursor raycaster="objects: .clickable" color="yellow"></a-cursor>
    </a-camera>

    <a-entity id="objects"></a-entity>

    <a-text id="distanceText" value="Searching GPS..." position="0 2 -3" align="center" color="yellow" scale="0.7 0.7 0.7"></a-text>
    <a-text id="scoreText" value="Score: 0" position="0 1.5 -3" align="center" color="white" scale="0.5 0.5 0.5"></a-text>

</a-scene>

<script>
    let score = 0;
    let firstSpawn = true;
    const objectsContainer = document.querySelector('#objects');
    const distanceText = document.querySelector('#distanceText');
    const scoreText = document.querySelector('#scoreText');

    function spawnObject(lat, lon) {
        let newLat = lat + (Math.random() - 0.5) * 0.0001;
        let newLon = lon + (Math.random() - 0.5) * 0.0001;

        const obj = document.createElement('a-box');
        obj.setAttribute('class', 'clickable');
        obj.setAttribute('color', 'red');
        obj.setAttribute('scale', '2 2 2');
        obj.setAttribute('gps-entity-place', `latitude: ${newLat}; longitude: ${newLon}`);
        obj.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 3000');

        obj.addEventListener('click', () => {
            score++;
            scoreText.setAttribute('value', 'Score: ' + score);
            
            obj.setAttribute('animation__die', 'property: scale; to: 0 0 0; dur: 300');
            
            setTimeout(() => {
                if (obj.parentNode) {
                    obj.parentNode.removeChild(obj);
                }
                spawnObject(lat, lon);
            }, 400);
        });

        objectsContainer.appendChild(obj);
    }

    window.addEventListener('gps-camera-update-position', e => {
        const lat = e.detail.position.latitude;
        const lon = e.detail.position.longitude;

        if (firstSpawn) {
            distanceText.setAttribute('value', 'GPS Connected');
            for(let i=0; i<3; i++) {
                spawnObject(lat, lon);
            }
            firstSpawn = false;
        }
    });

    window.addEventListener('gps-camera-error', () => {
        distanceText.setAttribute('value', 'ERROR: Check HTTPS/GPS');
        distanceText.setAttribute('color', 'red');
    });
</script>
</body>
</html>
